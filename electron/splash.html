<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Auto Peças Almeidas</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #020c3a, #01052a);
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
        }

        .logo {
            width: 220px;
        }

        .shine {
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.7) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-20deg);
            animation: shineMove 3s infinite;
        }

        @keyframes shineMove {
            0% {
                left: -75%
            }

            100% {
                left: 125%
            }
        }

        .title {
            color: white;
            font-size: 30px;
            font-weight: 700;
            margin-top: 15px;
        }

        .subtitle {
            color: #ff2a2a;
            letter-spacing: 6px;
            font-size: 14px;
        }

        .progress {
            margin-top: 35px;
            height: 8px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff2a2a, #ff6a00);
            transition: width 0.4s;
        }

        .loadingText {
            color: #cbd5ff;
            margin-top: 12px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .loader {
            margin: 35px auto 0;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ff2a2a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg)
            }

            100% {
                transform: rotate(360deg)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }

            100% {
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo-wrapper">

            <img src="../public/auto-peca.png" alt="Logo Auto Peças">

            <div class="shine"></div>

        </div>

        <div class="title">AUTO PEÇAS</div>

        <div class="subtitle">ALMEIDAS</div>

        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="loader"></div>

        <div class="loadingText" id="loadingText">CARREGANDO SISTEMA...</div>

    </div>

    <script>

        let progress = 0

        const bar = document.getElementById("progress")
        const text = document.getElementById("loadingText")

        const steps = [
            "Carrregando módulos...",
            "Inicializando banco...",
            "Preparando interface...",
            "Quase pronto..."
        ]

        let stepIndex = 0

        const interval = setInterval(() =>{

            progress += 10
            bar.style.width = progress + "%"

            if(progress % 25 === 0 && stepIndex < steps.length) {
                text.innerText = steps[stepIndex]
                stepIndex ++
            }

            if(progress >= 100) {
                clearInterval(interval)
            }
            
        }, 300)
    </script>

</body>

</html>
